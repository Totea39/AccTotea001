<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Gentle Journey — ระบบบัญชีใบเสร็จ AI</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
    /* สไตล์และธีมหลัก (จากดีไซน์เดิมของคุณ) */
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
    html,body{font-family:-apple-system,BlinkMacSystemFont,"Sarabun","Noto Sans Thai",sans-serif;background:#FDF8F0;color:#4D3420;min-height:100vh;padding-bottom:80px;}
    
    .header{position:sticky;top:0;z-index:100;background:rgba(253,248,240,.96);backdrop-filter:blur(14px);border-bottom:2px solid #E8D4B8;padding:14px 16px 12px;box-shadow:0 2px 14px rgba(107,76,42,.08)}
    .header-row{display:flex;justify-content:space-between;align-items:baseline}
    .header-total{font-size:28px;font-weight:800;color:#5C3E1E}
    
    .page{display:none; padding: 16px;}
    .page.active{display:block;}
    
    .item{background:#FFFDF8;border-radius:20px;padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:10px;box-shadow:0 4px 16px rgba(107,76,42,.1);border:1.5px solid #EEE0CC;}
    .thumb{width:54px;height:54px;border-radius:16px;overflow:hidden;flex-shrink:0;background:#F0D9BB;display:flex;align-items:center;justify-content:center;}
    .thumb img{width:100%;height:100%;object-fit:cover}
    .item-info{flex:1;min-width:0}
    .item-title{font-weight:700;font-size:15px;margin-bottom:5px;color:#3D2810;}
    .item-meta{font-size:12px;color:#9B7050;}
    .item-amount{font-weight:800;font-size:16px;color:#5C3E1E;text-align:right;}
    
    /* ปุ่มต่างๆ */
    .btn{border-radius:14px;padding:12px 18px;font-weight:700;font-size:15px;cursor:pointer;border:none;transition:all .2s; width:100%; margin-bottom:10px;}
    .btn-primary{background:linear-gradient(135deg,#C8873A,#9B5E1E);color:#fff;box-shadow:0 4px 14px rgba(155,94,30,.3)}
    .btn-secondary{background:#F0D9BB;color:#5C3E1E;}
    .btn-success{background:linear-gradient(135deg,#3A8A5A,#2A7A4A);color:#fff;}
    
    /* Form */
    .form-group{margin-bottom:16px}
    .form-label{font-size:12px;color:#5C3E1E;margin-bottom:6px;font-weight:700;display:block}
    .input{border:2px solid #DDD0C0;border-radius:14px;padding:12px 14px;outline:none;width:100%;background:#FFFDF8;font-size:15px;font-family:inherit}
    
    /* FAB & Nav */
    .fab{position:fixed;bottom:84px;right:20px;z-index:200;width:60px;height:60px;border-radius:30px;background:linear-gradient(135deg,#C8873A,#9B5E1E);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;box-shadow:0 8px 24px rgba(155,94,30,.45);}
    .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(253,248,240,.97);backdrop-filter:blur(14px);border-top:2px solid #E8D4B8;display:flex;height:68px;z-index:300;}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#B09070;font-size:12px;font-weight:600;background:none;border:none;cursor:pointer;}
    .nav-active{color:#C8873A;}
    
    /* Modal / Sheet */
    .backdrop{position:fixed;inset:0;background:rgba(40,25,10,.45);z-index:500;display:none;}
    .sheet{position:fixed;bottom:0;left:0;right:0;z-index:501;background:#FFFDF8;border-radius:28px 28px 0 0;padding:20px;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s; box-shadow:0 -8px 32px rgba(107,76,42,.15)}
    .sheet.open{transform:translateY(0);}
    
    /* Toast */
    #toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#3A8A5A;color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;font-weight:bold;z-index:9999;display:none;}
</style>
</head>
<body>

    <div class="header">
        <div style="font-size:11px;color:#9B7050;font-weight:700;">รวมยอดทั้งหมด</div>
        <div class="header-row">
            <div class="header-total" id="totalAmount">฿0.00</div>
            <div style="color:#9B7050;font-size:12px;" id="totalCount">0 รายการ</div>
        </div>
    </div>

    <div id="page-list" class="page active">
        <div id="receipt-container">
            <div style="text-align:center; padding: 40px; color: #9B7050;">กำลังโหลดข้อมูล...</div>
        </div>
    </div>

    <div id="page-summary" class="page">
        <h3 style="margin-bottom:16px;">ส่งออกข้อมูล (Export)</h3>
        <button class="btn btn-success" onclick="exportToExcel()">📥 ดาวน์โหลดไฟล์ Excel</button>
        <div style="margin-top:20px; font-size:14px; color:#9B7050;">
            * ข้อมูลทั้งหมดจะถูกส่งออกเป็นไฟล์ .xlsx โดยแยกตามชื่อโปรเจกต์
        </div>
    </div>

    <div id="page-settings" class="page">
        <h3 style="margin-bottom:16px;">⚙️ ตั้งค่าการเชื่อมต่อ (สำหรับ Admin)</h3>
        <div class="form-group">
            <label class="form-label">Supabase URL</label>
            <input type="text" id="cfg-sb-url" class="input" placeholder="https://xxxx.supabase.co">
        </div>
        <div class="form-group">
            <label class="form-label">Supabase Anon Key</label>
            <input type="password" id="cfg-sb-key" class="input" placeholder="eyJh...">
        </div>
        <div class="form-group">
            <label class="form-label">Google Gemini API Key</label>
            <input type="password" id="cfg-gemini" class="input" placeholder="AIza...">
        </div>
        <button class="btn btn-primary" onclick="saveSettings()">บันทึกการตั้งค่า</button>
    </div>

    <button class="fab" onclick="document.getElementById('fileInput').click()">+</button>
    <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFileUpload(event)">

    <div class="nav">
        <button class="nav-item nav-active" onclick="switchPage('page-list', this)">📋<br>รายการ</button>
        <button class="nav-item" onclick="switchPage('page-summary', this)">📊<br>สรุปผล</button>
        <button class="nav-item" onclick="switchPage('page-settings', this)">⚙️<br>ตั้งค่า</button>
    </div>

    <div class="backdrop" id="backdrop" onclick="closeSheet()"></div>
    <div class="sheet" id="addSheet">
        <h3 style="margin-bottom: 16px; color:#3D2810;" id="sheetTitle">ตรวจสอบข้อมูลใบเสร็จ</h3>
        
        <div style="text-align: center; margin-bottom: 16px;">
            <img id="previewImg" src="" style="max-height: 150px; border-radius: 12px; display: none; margin: 0 auto;">
            <div id="loadingStatus" style="color:#C8873A; font-weight:bold; display:none;">🤖 AI กำลังสแกนภาพ...</div>
        </div>

        <div class="form-group">
            <label class="form-label">ชื่อร้านค้า</label>
            <input type="text" id="f-vendor" class="input">
        </div>
        <div class="form-group">
            <label class="form-label">วันที่ (YYYY-MM-DD)</label>
            <input type="date" id="f-date" class="input">
        </div>
        <div class="form-group">
            <label class="form-label">ยอดเงินรวม</label>
            <input type="number" id="f-amount" class="input" step="0.01">
        </div>
        <div class="form-group">
            <label class="form-label">ชื่อโปรเจกต์ (หมวดหมู่)</label>
            <input type="text" id="f-project" class="input" placeholder="เช่น การตลาด, เดินทาง">
        </div>
        
        <button class="btn btn-primary" id="btnSave" onclick="saveReceipt()">💾 บันทึกข้อมูลขึ้น Cloud</button>
        <button class="btn btn-secondary" onclick="closeSheet()">ยกเลิก</button>
    </div>

    <div id="toast">บันทึกสำเร็จ!</div>

<script>
    // ==========================================
    // 1. SETUP & CONFIGURATION
    // ==========================================
    let supabaseClient = null;
    let receiptsData = [];
    let currentImageBlob = null; 
    let currentImageBase64 = null;

    // โหลดค่า Config จากเครื่องผู้ใช้
    const cfg = {
        sbUrl: localStorage.getItem('cfg_sbUrl') || '',
        sbKey: localStorage.getItem('cfg_sbKey') || '',
        gemini: localStorage.getItem('cfg_gemini') || ''
    };

    document.getElementById('cfg-sb-url').value = cfg.sbUrl;
    document.getElementById('cfg-sb-key').value = cfg.sbKey;
    document.getElementById('cfg-gemini').value = cfg.gemini;

    function saveSettings() {
        localStorage.setItem('cfg_sbUrl', document.getElementById('cfg-sb-url').value);
        localStorage.setItem('cfg_sbKey', document.getElementById('cfg-sb-key').value);
        localStorage.setItem('cfg_gemini', document.getElementById('cfg-gemini').value);
        showToast('บันทึกการตั้งค่าแล้ว ให้ทำการรีเฟรชหน้าเว็บ 1 ครั้ง');
        setTimeout(() => location.reload(), 1500);
    }

    // กำหนดค่า Supabase หากมี Key
    if(cfg.sbUrl && cfg.sbKey) {
        supabaseClient = supabase.createClient(cfg.sbUrl, cfg.sbKey);
        fetchReceipts();
        setupRealtime();
    } else {
        document.getElementById('receipt-container').innerHTML = '<div style="text-align:center; padding: 40px; color: #C44020;">⚠️ กรุณาใส่ API Key ในเมนูตั้งค่าก่อนใช้งาน</div>';
    }

    // ==========================================
    // 2. UI NAVIGATION & TOAST
    // ==========================================
    function switchPage(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('nav-active'));
        btn.classList.add('nav-active');
    }

    function showToast(msg, isError = false) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.background = isError ? '#C44020' : '#3A8A5A';
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    function openSheet() {
        document.getElementById('backdrop').style.display = 'block';
        setTimeout(()=> document.getElementById('addSheet').classList.add('open'), 10);
    }
    
    function closeSheet() {
        document.getElementById('addSheet').classList.remove('open');
        setTimeout(()=> document.getElementById('backdrop').style.display = 'none', 300);
        // Reset form
        document.getElementById('f-vendor').value = '';
        document.getElementById('f-date').value = '';
        document.getElementById('f-amount').value = '';
        document.getElementById('f-project').value = '';
        document.getElementById('previewImg').style.display = 'none';
        document.getElementById('fileInput').value = '';
    }

    // ==========================================
    // 3. IMAGE COMPRESSION (CANVAS)
    // ==========================================
    function handleFileUpload(e) {
        const file = e.target.files[0];
        if(!file) return;

        openSheet();
        document.getElementById('loadingStatus').style.display = 'block';
        document.getElementById('btnSave').disabled = true;

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (ev) => {
            const img = new Image();
            img.src = ev.target.result;
            img.onload = () => {
                // ย่อภาพให้ไม่เกิน 1024px
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 1024;
                let w = img.width, h = img.height;
                if(w > MAX_WIDTH) { h = (MAX_WIDTH/w)*h; w = MAX_WIDTH; }
                
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                
                // บีบอัดภาพ (Quality 0.7)
                currentImageBase64 = canvas.toDataURL('image/jpeg', 0.7);
                document.getElementById('previewImg').src = currentImageBase64;
                document.getElementById('previewImg').style.display = 'block';
                
                canvas.toBlob((blob) => {
                    currentImageBlob = blob;
                    // เมื่อบีบอัดเสร็จ ให้เรียก AI สแกน
                    scanWithGemini(currentImageBase64);
                }, 'image/jpeg', 0.7);
            };
        };
    }

    // ==========================================
    // 4. AI OCR (GEMINI 2.0 FLASH)
    // ==========================================
    async function scanWithGemini(base64Str) {
        if(!cfg.gemini) {
            showToast('ไม่มี Gemini API Key ข้ามการสแกนอัตโนมัติ', true);
            document.getElementById('loadingStatus').style.display = 'none';
            document.getElementById('btnSave').disabled = false;
            return;
        }

        try {
            const base64Data = base64Str.split(',')[1];
            const prompt = `ทำหน้าที่ OCR สแกนใบเสร็จนี้ และดึงข้อมูลออกมาเป็น JSON เท่านั้น โครงสร้าง: {"vendor": "ชื่อร้าน", "date": "YYYY-MM-DD", "amount": ตัวเลขยอดรวมทศนิยม, "project": "ระบุชื่อโปรเจกต์หากมี หรือเว้นว่าง"}`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${cfg.gemini}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64Data } }] }]
                })
            });

            const data = await response.json();
            let textRaw = data.candidates[0].content.parts[0].text;
            let cleanJson = textRaw.replace(/```json/g, '').replace(/```/g, '').trim();
            const result = JSON.parse(cleanJson);

            // เติมข้อมูลลงฟอร์ม
            document.getElementById('f-vendor').value = result.vendor || '';
            document.getElementById('f-date').value = result.date || '';
            document.getElementById('f-amount').value = result.amount || '';
            document.getElementById('f-project').value = result.project || '';

            showToast('สแกนสำเร็จ กรุณาตรวจสอบความถูกต้อง');
        } catch (error) {
            showToast('AI สแกนผิดพลาด กรุณากรอกเอง', true);
        } finally {
            document.getElementById('loadingStatus').style.display = 'none';
            document.getElementById('btnSave').disabled = false;
        }
    }

    // ==========================================
    // 5. SUPABASE (DB & STORAGE)
    // ==========================================
    async function saveReceipt() {
        if(!supabaseClient) return showToast('ยังไม่ได้ตั้งค่า Supabase', true);
        
        const vendor = document.getElementById('f-vendor').value;
        const date = document.getElementById('f-date').value;
        const amount = parseFloat(document.getElementById('f-amount').value);
        const project = document.getElementById('f-project').value;

        if(!vendor || !amount) return showToast('กรุณากรอกชื่อร้านและยอดเงิน', true);
        
        document.getElementById('btnSave').innerText = 'กำลังอัปโหลด...';
        document.getElementById('btnSave').disabled = true;

        try {
            let imageUrl = '';
            // 1. Upload รูปไปที่ Storage
            if(currentImageBlob) {
                const fileName = `rcpt_${Date.now()}.jpg`;
                const { error: uploadErr } = await supabaseClient.storage.from('receipts').upload(fileName, currentImageBlob, { contentType: 'image/jpeg' });
                if(uploadErr) throw uploadErr;
                
                const { data: pubData } = supabaseClient.storage.from('receipts').getPublicUrl(fileName);
                imageUrl = pubData.publicUrl;
            }

            // 2. Insert ลง Database
            const { error: dbErr } = await supabaseClient.from('receipts').insert([{
                vendor, date, amount, project, image_url: imageUrl
            }]);
            
            if(dbErr) throw dbErr;

            showToast('บันทึกข้อมูลเรียบร้อยแล้ว!');
            closeSheet();
            document.getElementById('btnSave').innerText = '💾 บันทึกข้อมูลขึ้น Cloud';
            
            // ข้อมูลจะรีเฟรชเองผ่าน Realtime Subscription

        } catch(e) {
            console.error(e);
            showToast('เกิดข้อผิดพลาดในการบันทึก', true);
            document.getElementById('btnSave').innerText = '💾 บันทึกข้อมูลขึ้น Cloud';
            document.getElementById('btnSave').disabled = false;
        }
    }

    async function fetchReceipts() {
        const { data, error } = await supabaseClient.from('receipts').select('*').order('created_at', { ascending: false });
        if(data) {
            receiptsData = data;
            renderList();
        }
    }

    // Real-time Update
    function setupRealtime() {
        supabaseClient.channel('custom-all-channel')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'receipts' }, payload => {
            fetchReceipts(); // โหลดข้อมูลใหม่เมื่อมีคนแก้ไข
        }).subscribe();
    }

    function renderList() {
        const container = document.getElementById('receipt-container');
        container.innerHTML = '';
        let sum = 0;

        if(receiptsData.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding: 40px; color:#9B7050;">ยังไม่มีข้อมูลใบเสร็จในระบบ</div>';
        }

        receiptsData.forEach(r => {
            sum += parseFloat(r.amount) || 0;
            const imgHtml = r.image_url ? `<img src="${r.image_url}">` : `<span>📄</span>`;
            
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <div class="thumb">${imgHtml}</div>
                <div class="item-info">
                    <div class="item-title">${r.vendor}</div>
                    <div class="item-meta">📅 ${r.date || '-'} ${r.project ? `| 📁 ${r.project}` : ''}</div>
                </div>
                <div class="item-amount">฿${parseFloat(r.amount).toLocaleString('en-US', {minimumFractionDigits:2})}</div>
            `;
            // ถ้าอยากให้กดแล้วเปิดรูปภาพใหญ่ ให้เพิ่ม onclick เปิด Modal ได้
            container.appendChild(div);
        });

        document.getElementById('totalAmount').innerText = `฿${sum.toLocaleString('en-US', {minimumFractionDigits:2})}`;
        document.getElementById('totalCount').innerText = `${receiptsData.length} รายการ`;
    }

    // ==========================================
    // 6. EXPORT TO EXCEL
    // ==========================================
    function exportToExcel() {
        if(receiptsData.length === 0) return showToast('ไม่มีข้อมูลให้ส่งออก', true);
        
        // แปลง JSON โครงสร้างใหม่ให้สวยงาม
        const exportData = receiptsData.map(r => ({
            'วันที่': r.date,
            'ชื่อร้านค้า/รายการ': r.vendor,
            'โปรเจกต์': r.project,
            'ยอดเงิน (บาท)': r.amount,
            'ลิงก์ภาพใบเสร็จ': r.image_url,
            'เวลาที่บันทึก': new Date(r.created_at).toLocaleString('th-TH')
        }));

        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Receipts");
        XLSX.writeFile(wb, `Receipt_Export_${new Date().getTime()}.xlsx`);
    }

</script>
</body>
</html>
